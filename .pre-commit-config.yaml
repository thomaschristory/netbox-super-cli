repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        # Bundled NetBox OpenAPI schemas are legitimately ~10–15 MB.
        # The guard still catches accidental binary blobs.
        args: [--maxkb=16384]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        # Keep this list in sync with [project.dependencies] in pyproject.toml.
        additional_dependencies:
          - pydantic>=2.7
          - typer>=0.12
          - rich>=13.7
          - httpx>=0.27
          - "ruamel.yaml>=0.18"
          - structlog>=24.1
          - platformdirs>=4.2
        args: [--strict]
        files: ^nsc/
